<header class="app-header">
  <a class="brand" routerLink="/">Recipe App</a>
  <nav>
    <a routerLink="/recipes">Recipes</a>
    @if (authService.isLoggedIn) {
      <a routerLink="/shopping-list">Shopping List</a>
    }
    @if (authService.loading()) {
      <!-- checking session -->
    } @else if (authService.isLoggedIn) {
      <a routerLink="/profile" class="user-name">{{ authService.displayName() || authService.user().email }}</a>
      <button (click)="authService.signOut()">Sign out</button>
    } @else {
      <a routerLink="/login">Sign in</a>
    }
  </nav>
</header>

<main>
  <router-outlet />
</main>
